server {
    listen 80;
    server_name www.spekila.com spekila.com;

    # Use Docker's internal DNS resolver — resolves service names at request time
    # so nginx doesn't fail if backend/frontend aren't up at startup
    resolver 127.0.0.11 valid=30s;

    # Backend API — preserve /api/ prefix
    location /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Prevent browsers from caching error responses from the proxy
    proxy_intercept_errors on;
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        add_header Cache-Control "no-store" always;
        return 503 "Service temporarily unavailable";
    }

    # Frontend SPA
    location / {
        set $frontend http://frontend:80;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Ensure the browser never caches the proxy response itself
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
