server {
    listen 80;
    server_name www.spekila.com spekila.com;

    # Use Docker's internal DNS resolver — resolves service names at request time
    # so nginx doesn't fail if backend/frontend aren't up at startup
    resolver 127.0.0.11 valid=30s;

    # Backend API — preserve /api/ prefix
    location /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Frontend SPA
    location / {
        set $frontend http://frontend:80;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
