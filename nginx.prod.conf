
# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name www.spekila.com spekila.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name www.spekila.com spekila.com;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Use Docker's internal DNS resolver — resolves service names at request time
    # so nginx doesn't fail if backend/frontend aren't up at startup
    resolver 127.0.0.11 valid=30s;

    # Backend API
    location /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Prevent browsers from caching error responses from the proxy
    proxy_intercept_errors on;
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        add_header Cache-Control "no-store" always;
        return 503 "Service temporarily unavailable";
    }

    # Frontend SPA
    location / {
        set $frontend http://frontend:80;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
