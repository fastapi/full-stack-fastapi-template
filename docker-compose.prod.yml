services:
  nginx:
    image: nginx:1.27
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://www.spekila.com
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
        VITE_STRIPE_PRO_PRICE_ID: ${VITE_STRIPE_PRO_PRICE_ID:-}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: kila/backend/Dockerfile
    environment:
      - ENVIRONMENT=production
    env_file:
      - ./backend/.env.prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  scraper:
    build:
      context: ..
      dockerfile: kila-scraper/Dockerfile
    environment:
      - ENVIRONMENT=production
    env_file:
      - ../kila-scraper/.env.prod
    volumes:
      - ../data:/data
      - reports_storage:/app/storage/reports
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.brand-search-daily.schedule: "0 0 2 * * *"
      ofelia.job-exec.brand-search-daily.command: "python -m app.jobs.daily_pipeline"
      ofelia.job-exec.brand-search-weekly.schedule: "0 0 23 * * 0"
      ofelia.job-exec.brand-search-weekly.command: "python -m app.jobs.weekly_pipeline"
      ofelia.job-exec.brand-search-weekly-email.schedule: "0 0 8 * * 1"
      ofelia.job-exec.brand-search-weekly-email.command: "python -m app.jobs.weekly_email_pipeline"
    restart: unless-stopped

  ofelia:
    image: mcuadros/ofelia:v0.3.12
    depends_on:
      - scraper
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

volumes:
  reports_storage:
