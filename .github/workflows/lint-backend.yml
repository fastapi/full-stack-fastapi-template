name: Lint Backend

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'release-notes.md'
      - renovate.json
      - development.md
      - deployment.md
      - SECURITY.md
      - README.md
      - LICENSE
      - .pre-commit-config.yaml
      - .gitignore
      - .gitattributes
      - .editorconfig
      - '.better-commits.json'
      - img/*
      - hooks/*
      - .copier/*
  pull_request:
    types:
      - opened
      - synchronize
    paths-ignore:
      - 'release-notes.md'
      - development.md
      - deployment.md
      - SECURITY.md
      - README.md
      - LICENSE
      - .pre-commit-config.yaml
      - .gitignore
      - .gitattributes
      - img/*
      - hooks/*
      - .copier/*

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.4.15"
          enable-cache: true
      - run: uv run bash scripts/lint.sh
        working-directory: backend
