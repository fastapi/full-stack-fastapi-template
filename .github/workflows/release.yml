name: release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "dev | staging | prod"
        required: true
        default: staging
        type: choice
        options: [dev, staging, prod]
      service_scope:
        description: "frontend-only | backend-only | worker-only | all"
        required: true
        default: all
      release_id:
        description: "Immutable release id. Defaults to commit SHA when omitted."
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image_digest: ${{ steps.digest.outputs.image_digest }}
      release_id: ${{ steps.digest.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install YAML parser
        run: python -m pip install --disable-pip-version-check pyyaml
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_RELEASE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push selected images
        shell: bash
        run: |
          RELEASE_ID="${{ inputs.release_id }}"
          if [ -z "$RELEASE_ID" ]; then
            RELEASE_ID="${GITHUB_SHA}"
          fi
          export RELEASE_ID
          python - <<'PY'
          import json
          import os
          import subprocess
          import time
          from pathlib import Path

          import yaml

          project = yaml.safe_load(open(".cicd/project.yaml", encoding="utf-8")) or {}
          env_name = os.environ["DEPLOY_ENVIRONMENT"]
          env_path = Path(f".cicd/env/{env_name}.yaml")
          if not env_path.exists():
              env_path = Path(f".cicd/env/{env_name}.yaml.example")
          if not env_path.exists():
              raise SystemExit(f"Missing environment config for {env_name}")

          env_cfg = yaml.safe_load(env_path.read_text(encoding="utf-8")) or {}
          scope = os.environ["SERVICE_SCOPE"]
          release_id = os.environ["RELEASE_ID"]
          aws_cfg = env_cfg.get("aws") or {}
          region = aws_cfg.get("region") or os.environ.get("AWS_REGION") or "us-east-1"
          account_id = (aws_cfg.get("account_id") or "").strip()
          if not account_id or str(account_id).startswith("TODO"):
              account_id = subprocess.check_output(
                  ["aws", "sts", "get-caller-identity", "--query", "Account", "--output", "text"],
                  text=True,
              ).strip()
          ecr_registry = f"{account_id}.dkr.ecr.{region}.amazonaws.com"
          ecr_cfg = env_cfg.get("ecr") or {}
          app_cfg = env_cfg.get("app") or {}
          app_name = (
              app_cfg.get("name")
              or (project.get("project") or {}).get("app_name")
              or os.environ.get("GITHUB_REPOSITORY", "").split("/")[-1]
          )
          if str(app_name).startswith("TODO"):
              app_name = os.environ.get("GITHUB_REPOSITORY", "").split("/")[-1]
          default_repo = f"{str(app_name).replace('_', '-').lower()}-{env_name}"

          def repo_for(name: str) -> str:
              keys = {
                  "frontend": "frontend_repository",
                  "backend": "backend_repository",
                  "worker": "worker_repository",
                  "web": "repository",
              }
              env_key = keys.get(name, "repository")
              return (
                  ecr_cfg.get(env_key)
                  or ecr_cfg.get("repository")
                  or os.environ.get(f"ECR_REPOSITORY_{name.upper()}", "")
                  or os.environ.get("ECR_REPOSITORY", "")
                  or default_repo
              )

          def is_enabled(svc: dict) -> bool:
              v = svc.get("enabled")
              if v is True:
                  return True
              if isinstance(v, str) and not v.startswith("TODO"):
                  return v.lower() in ("true", "yes", "1")
              return False

          def scope_matches(name: str) -> bool:
              if scope == "all":
                  return True
              aliases = {
                  "frontend-only": ("frontend", "web"),
                  "backend-only": ("backend",),
                  "worker-only": ("worker",),
              }
              if scope in aliases:
                  return name in aliases[scope]
              return scope == f"{name}-only"

          selected = []
          for name, svc in (project.get("services") or {}).items():
              if not svc or not is_enabled(svc):
                  continue
              if not scope_matches(name):
                  continue
              selected.append((name, svc))

          if not selected:
              raise SystemExit(f"No enabled services selected by scope {scope}")

          metadata = {
              "schema_version": 1,
              "release_id": release_id,
              "environment": env_name,
              "service_scope": scope,
              "commit_sha": os.environ["GITHUB_SHA"],
              "actor": os.environ["GITHUB_ACTOR"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "created_at": int(time.time()),
              "images": {},
          }

          for name, svc in selected:
              repository = repo_for(name)
              if not repository or str(repository).startswith("TODO"):
                  raise SystemExit(f"Missing ECR repository variable for {name}")
              repository_uri = repository if ".amazonaws.com/" in repository else f"{ecr_registry}/{repository}"

              context = svc.get("build_context") or svc.get("path") or "."
              dockerfile = svc.get("dockerfile") or f"{context}/Dockerfile"
              image = f"{repository_uri}:{release_id}"
              subprocess.run(["docker", "build", "-f", dockerfile, "-t", image, context], check=True)
              subprocess.run(["docker", "push", image], check=True)

              repository_name = repository_uri.split("/", 1)[1]
              digest = subprocess.check_output(
                  ["aws", "ecr", "describe-images", "--repository-name", repository_name,
                   "--image-ids", f"imageTag={release_id}", "--query", "imageDetails[0].imageDigest",
                   "--output", "text"],
                  text=True,
              ).strip()

              metadata["images"][name] = {
                  "repository": repository_uri,
                  "repository_name": repository_name,
                  "tag": release_id,
                  "image_tag": image,
                  "digest": digest,
                  "image_uri": f"{repository_uri}@{digest}",
                  "dockerfile": dockerfile,
                  "build_context": context,
              }

          open("promotion-metadata.json", "w", encoding="utf-8").write(json.dumps(metadata, indent=2))
          PY
        env:
          DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
          SERVICE_SCOPE: ${{ inputs.service_scope }}
          RELEASE_ID: ${{ inputs.release_id || github.sha }}
          ECR_REPOSITORY_FRONTEND: ${{ vars.ECR_REPOSITORY_FRONTEND }}
          ECR_REPOSITORY_BACKEND: ${{ vars.ECR_REPOSITORY_BACKEND }}
          ECR_REPOSITORY_WORKER: ${{ vars.ECR_REPOSITORY_WORKER }}

      - id: digest
        run: |
          DIGEST=$(python -c "import json; m=json.load(open('promotion-metadata.json')); imgs=m.get('images',{}); print(next(iter(imgs.values()))['digest'] if imgs else '')")
          echo "image_digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "release_id=${{ inputs.release_id || github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: promotion-metadata
          path: promotion-metadata.json
      - name: Summarize release
        run: |
          echo "## Release metadata" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat promotion-metadata.json >> "$GITHUB_STEP_SUMMARY"
