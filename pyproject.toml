[tool.uv.workspace]
members = ["backend"]

[dependency-groups]
dev = [
    "zizmor>=1.23.1",
]

github-actions = [
    "smokeshow >=0.5.0",
]

[tool.typos.files]
extend-exclude = [
    "img/",
    "release-notes.md",
    "uv.lock",
    "bun.lock",
    "backend/coverage/",
    "backend/htmlcov/",
    "frontend/dist/",
    "frontend/public/assets/images/",
]

[tool.typos.default.extend-identifiers]
alls = "alls"
